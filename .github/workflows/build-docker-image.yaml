name: Build and Push Containers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version (e.g.: 1.0.0) - leave empty for only latest'
        required: false
        default: ''
      latest:
        description: 'Update the latest tag as well?'
        type: boolean
        default: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build and push each service
      - name: Build and push all services
        run: |
            set -euo pipefail

            build_and_push() {
              IMAGE_NAME="$1"
              CONTEXT_PATH="$2"
              DOCKERFILE_PATH="$3"
              BUILD_ARGS="${4:-}"

              TAGS="${IMAGE_NAME}:sha-$(echo ${{ github.sha }} | cut -c1-7)"

              if [[ "${{ inputs.version }}" != "" ]]; then
                VERSION=${{ inputs.version }}
                TAGS="$TAGS,${IMAGE_NAME}:$VERSION"

                MAJOR=$(echo "$VERSION" | cut -d. -f1)
                MINOR=$(echo "$VERSION" | cut -d. -f2)

                if [[ "$MAJOR" != "" ]]; then
                  TAGS="$TAGS,${IMAGE_NAME}:$MAJOR"
                  if [[ "$MINOR" != "" ]]; then
                    TAGS="$TAGS,${IMAGE_NAME}:$MAJOR.$MINOR"
                  fi
                fi
              fi

              if [[ "${{ inputs.latest }}" == "true" ]]; then
                TAGS="$TAGS,${IMAGE_NAME}:latest"
              fi

              TAG_ARGS=$(echo "$TAGS" | sed 's/,/ --tag /g')

              echo "Building ${IMAGE_NAME} with tags: $TAG_ARGS"

              docker buildx build \
                --push \
                --platform linux/amd64 \
                --cache-from type=gha \
                --cache-to type=gha,mode=max \
                --file "$DOCKERFILE_PATH" \
                $BUILD_ARGS \
                --tag $TAG_ARGS \
                "$CONTEXT_PATH"
            }

            FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/indovina-chi-frontend"
            SERVER_IMAGE="ghcr.io/${{ github.repository_owner }}/indovina-chi-server"

            build_and_push "$FRONTEND_IMAGE" "./frontend" "./frontend/Dockerfile"
            build_and_push "$SERVER_IMAGE" "./server" "./server/Dockerfile"